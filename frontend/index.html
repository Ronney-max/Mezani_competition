<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mezani Barista Competition 2026</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1 class="main-title">Mezani Barista Competition 2026</h1>

    <form id="registrationForm">
      <div class="section-box">
        <h3>Personal Information</h3>

        <label>Full Name</label>
        <input type="text" name="name" required />

        <label>Email</label>
        <input type="email" name="email" required />

        <label>Phone Number</label>
        <input type="tel" name="phone" required />

        <label>Gender</label>
        <input type="text" name="gender" required />
      </div>

      <div class="section-box">
        <h3>Competition Category</h3>

        <div class="category-group">
          <label>
            <input type="radio" name="category" value="Barista Competition" required />
            Barista Competition
          </label>

          <label>
            <input type="radio" name="category" value="Brewers Competition" required />
            Brewers Competition
          </label>

          <label>
            <input type="radio" name="category" value="Latte Art Competition" required />
            Latte Art Competition
          </label>

          <div class="experience">
            <label for="experience">Years of Experience</label>
            <input
              type="number"
              id="experience"
              name="experience"
              min="0"
              max="50"
              placeholder="Enter years of experience"
              required
            />
          </div>
        </div>
      </div>

      <div class="section-box">
        <h3>Age Group</h3>

        <div class="age-group">
          <label>
            <input type="radio" name="age_group" value="18-25" required />
            18-25 yrs
          </label>

          <label>
            <input type="radio" name="age_group" value="26-35" required />
            26-35 yrs
          </label>

          <label>
            <input type="radio" name="age_group" value="36-45" required />
            36-45 yrs
          </label>

          <label>
            <input type="radio" name="age_group" value="46+" required />
            46+ yrs
          </label>
        </div>
      </div>

      <button id="submitButton" type="submit">Register</button>
      <p id="formStatus" class="form-status" aria-live="polite"></p>
    </form>
  </div>

  <script src="app.js"></script>
</body>
</html>
